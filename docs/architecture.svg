  <text x="702" y="467" text-anchor="middle" font-size="9" fill="#b45309">Ticket agents call the Ticketing API directly</text>
  <text x="702" y="482" text-anchor="middle" font-size="9" fill="#b45309">Off-topic node calls LLM directly — no retrieval step</text>
  <text x="702" y="497" text-anchor="middle" font-size="8" fill="#d97706" font-style="italic">dashed arrows indicate direct path below ↓</text>

