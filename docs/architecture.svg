  <line x1="556" y1="505" x2="556" y2="542" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#v2-amber)"/>
  <line x1="696" y1="375" x2="696" y2="415" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,3"/>
