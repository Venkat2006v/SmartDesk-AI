<svg viewBox="0 0 940 710" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>SmartDesk AI Architecture — Two-Path Design</title>
  <desc>Knowledge Path: KB agents flow through RAG Pipeline then LLM. Action Path: Ticket and Off-topic agents go directly to external services, bypassing RAG entirely.</desc>

  <defs>
    <marker id="v2-blue" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#3b82f6"/></marker>
    <marker id="v2-purple" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#7c3aed"/></marker>
    <marker id="v2-green" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#059669"/></marker>
    <marker id="v2-pink" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#db2777"/></marker>
    <marker id="v2-amber" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#d97706"/></marker>
    <marker id="v2-indigo" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#4f46e5"/></marker>
  </defs>

  <!-- Page background -->
  <rect width="940" height="710" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="470" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">SmartDesk AI — System Architecture</text>

  <!-- LAYER 1: USER INTERFACE -->
  <text x="22" y="46" font-size="8.5" font-weight="700" fill="#9ca3af" letter-spacing="1">USER INTERFACE</text>
  <line x1="22" y1="50" x2="918" y2="50" stroke="#e5e7eb" stroke-width="1"/>

  <rect x="175" y="57" width="148" height="56" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="249" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">CLI</text>
  <text x="249" y="91" text-anchor="middle" font-size="8.5" fill="#1e40af">main.py</text>
  <text x="249" y="105" text-anchor="middle" font-size="8" fill="#3b82f6">REPL · session state</text>

  <rect x="617" y="57" width="148" height="56" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="691" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">Gradio UI</text>
  <text x="691" y="91" text-anchor="middle" font-size="8.5" fill="#1e40af">ui/app.py</text>
  <text x="691" y="105" text-anchor="middle" font-size="8" fill="#3b82f6">Multi-turn · gr.State()</text>

  <!-- LAYER 2: ORCHESTRATION -->
  <text x="22" y="124" font-size="8.5" font-weight="700" fill="#9ca3af" letter-spacing="1">ORCHESTRATION</text>
  <line x1="22" y1="128" x2="918" y2="128" stroke="#e5e7eb" stroke-width="1"/>

  <rect x="90" y="134" width="760" height="72" rx="7" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="470" y="154" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">LangGraph Orchestrator</text>
  <text x="470" y="169" text-anchor="middle" font-size="8.5" fill="#6d28d9">orchestrator/graph.py · StateGraph(AgentState) · graph.compile() · run_once()</text>
  <rect x="128" y="176" width="684" height="22" rx="4" fill="#c4b5fd"/>
  <text x="470" y="191" text-anchor="middle" font-size="8.5" font-weight="600" fill="#4c1d95">Supervisor Node — LLM classifier → sets state["route"] → conditional edges to agent nodes</text>

  <!-- UI → Orchestrator arrows -->
  <line x1="249" y1="113" x2="310" y2="134" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#v2-blue)"/>
  <line x1="691" y1="113" x2="640" y2="134" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#v2-blue)"/>

  <!-- LAYER 3: AGENTS (two swimlanes) -->
