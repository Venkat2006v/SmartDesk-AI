  <line x1="782" y1="280" x2="896" y2="280" stroke="#d1d5db" stroke-width="1"/>
  <text x="839" y="294" text-anchor="middle" font-size="7.5" fill="#4b5563">Friendly fallback</text>
  <text x="839" y="307" text-anchor="middle" font-size="7.5" fill="#4b5563">Warm LLM reply</text>
  <text x="839" y="320" text-anchor="middle" font-size="7.5" fill="#4b5563">Domain redirect</text>
  <text x="839" y="346" text-anchor="middle" font-size="7.5" fill="#6b7280">graph.py</text>
  <text x="839" y="364" text-anchor="middle" font-size="9" fill="#6b7280">⬇ direct</text>

  <!-- Supervisor → agents (dashed purple) -->
  <line x1="270" y1="206" x2="93" y2="243" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#v2-purple)"/>
  <line x1="340" y1="206" x2="239" y2="243" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#v2-purple)"/>
  <line x1="420" y1="206" x2="393" y2="243" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#v2-purple)"/>
  <line x1="510" y1="206" x2="556" y2="243" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#v2-purple)"/>
  <line x1="580" y1="206" x2="696" y2="243" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#v2-purple)"/>
  <line x1="640" y1="206" x2="839" y2="243" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#v2-purple)"/>

