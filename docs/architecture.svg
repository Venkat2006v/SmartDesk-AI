  <text x="696" y="261" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Ticket Status</text>
  <text x="696" y="274" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Agent</text>
  <line x1="642" y1="280" x2="750" y2="280" stroke="#fcd34d" stroke-width="1"/>
  <text x="696" y="294" text-anchor="middle" font-size="7.5" fill="#b45309">Ticket ID lookup</text>
  <text x="696" y="307" text-anchor="middle" font-size="7.5" fill="#b45309">Email validation</text>
  <text x="696" y="320" text-anchor="middle" font-size="7.5" fill="#b45309">Format results</text>
  <text x="696" y="346" text-anchor="middle" font-size="7.5" fill="#d97706">ticket_status_agent.py</text>
  <text x="696" y="364" text-anchor="middle" font-size="9" fill="#d97706">⬇ direct</text>

