  <rect x="772" y="243" width="134" height="132" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="839" y="261" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">Off-topic</text>
