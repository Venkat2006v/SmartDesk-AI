  <text x="248" y="593" text-anchor="middle" font-size="8" fill="#6366f1">KB path: answer synthesis after RAG retrieval · Off-topic: direct response generation</text>

  <rect x="486" y="542" width="432" height="66" rx="7" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="702" y="563" text-anchor="middle" font-size="11" font-weight="700" fill="#3730a3">Ticketing System</text>
