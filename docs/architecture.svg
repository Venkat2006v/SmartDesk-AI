  <text x="22" y="405" font-size="8.5" font-weight="700" fill="#9ca3af" letter-spacing="1">RAG PIPELINE</text>
  <line x1="22" y1="409" x2="918" y2="409" stroke="#e5e7eb" stroke-width="1"/>

