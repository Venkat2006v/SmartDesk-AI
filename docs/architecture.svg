  <text x="239" y="471" text-anchor="middle" font-size="7.5" fill="#be185d">OpenAI text-embed-3</text>
  <text x="239" y="483" text-anchor="middle" font-size="7.5" fill="#be185d">FastEmbed BAAI/bge</text>

  <!-- KB Docs -->
  <rect x="318" y="423" width="150" height="74" rx="5" fill="white" stroke="#db2777" stroke-width="1.2"/>
  <text x="393" y="441" text-anchor="middle" font-size="10" font-weight="700" fill="#9d174d">Knowledge Base</text>
  <text x="393" y="454" text-anchor="middle" font-size="7.5" fill="#be185d">ingestion.py</text>
