  <text x="496" y="239" font-size="8.5" font-weight="700" fill="#b45309">ACTION PATH</text>

  <!-- IT KB Agent -->
  <rect x="26" y="243" width="134" height="132" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="93" y="261" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">IT Knowledge</text>
  <text x="93" y="274" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Agent</text>
  <line x1="36" y1="280" x2="150" y2="280" stroke="#a7f3d0" stroke-width="1"/>
  <text x="93" y="294" text-anchor="middle" font-size="7.5" fill="#047857">Hybrid RAG retrieval</text>
  <text x="93" y="307" text-anchor="middle" font-size="7.5" fill="#047857">Confidence scoring</text>
  <text x="93" y="320" text-anchor="middle" font-size="7.5" fill="#047857">LLM answer synthesis</text>
  <text x="93" y="333" text-anchor="middle" font-size="7.5" fill="#047857">Escalation fallback</text>
  <text x="93" y="346" text-anchor="middle" font-size="7.5" fill="#059669">it_knowledge_agent.py</text>
  <text x="93" y="364" text-anchor="middle" font-size="9" fill="#059669">⬇ via RAG</text>

  <!-- HR KB Agent -->
  <rect x="172" y="243" width="134" height="132" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="239" y="261" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">HR Knowledge</text>
  <text x="239" y="274" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Agent</text>
  <line x1="182" y1="280" x2="296" y2="280" stroke="#a7f3d0" stroke-width="1"/>
  <text x="239" y="294" text-anchor="middle" font-size="7.5" fill="#047857">Hybrid RAG retrieval</text>
  <text x="239" y="307" text-anchor="middle" font-size="7.5" fill="#047857">Confidence scoring</text>
  <text x="239" y="320" text-anchor="middle" font-size="7.5" fill="#047857">LLM answer synthesis</text>
  <text x="239" y="333" text-anchor="middle" font-size="7.5" fill="#047857">Escalation fallback</text>
  <text x="239" y="346" text-anchor="middle" font-size="7.5" fill="#059669">hr_knowledge_agent.py</text>
  <text x="239" y="364" text-anchor="middle" font-size="9" fill="#059669">⬇ via RAG</text>

  <!-- Combined KB Agent -->
  <rect x="318" y="243" width="150" height="132" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="393" y="261" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Combined KB</text>
  <text x="393" y="274" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Agent</text>
  <line x1="328" y1="280" x2="458" y2="280" stroke="#a7f3d0" stroke-width="1"/>
  <text x="393" y="294" text-anchor="middle" font-size="7.5" fill="#047857">IT + HR RAG retrieval</text>
  <text x="393" y="307" text-anchor="middle" font-size="7.5" fill="#047857">Cross-domain synthesis</text>
  <text x="393" y="320" text-anchor="middle" font-size="7.5" fill="#047857">Unified answer</text>
  <text x="393" y="346" text-anchor="middle" font-size="7.5" fill="#059669">combined_knowledge</text>
  <text x="393" y="357" text-anchor="middle" font-size="7.5" fill="#059669">_agent.py</text>
  <text x="393" y="368" text-anchor="middle" font-size="9" fill="#059669">⬇ via RAG</text>

  <!-- Ticket Creation Agent -->
  <rect x="492" y="243" width="128" height="132" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="556" y="261" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Ticket Creation</text>
  <text x="556" y="274" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Agent</text>
  <line x1="502" y1="280" x2="610" y2="280" stroke="#fcd34d" stroke-width="1"/>
  <text x="556" y="294" text-anchor="middle" font-size="7.5" fill="#b45309">LLM field extraction</text>
  <text x="556" y="307" text-anchor="middle" font-size="7.5" fill="#b45309">Email validation</text>
  <text x="556" y="320" text-anchor="middle" font-size="7.5" fill="#b45309">HITL confirmation</text>
  <text x="556" y="333" text-anchor="middle" font-size="7.5" fill="#b45309">Pydantic schema</text>
  <text x="556" y="346" text-anchor="middle" font-size="7.5" fill="#d97706">ticket_creation_agent.py</text>
  <text x="556" y="364" text-anchor="middle" font-size="9" fill="#d97706">⬇ direct</text>

