  <text x="393" y="471" text-anchor="middle" font-size="7.5" fill="#be185d">IT docs · HR docs</text>
  <text x="393" y="483" text-anchor="middle" font-size="7.5" fill="#be185d">chunk 500ch · overlap 50</text>

