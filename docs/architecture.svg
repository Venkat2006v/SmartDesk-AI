  <text x="702" y="593" text-anchor="middle" font-size="8" fill="#6366f1">create_ticket · get_tickets_for_email · HITL gate (UI: multi-turn · CLI: blocking)</text>

  <!-- RAG → LLM API -->
  <line x1="248" y1="505" x2="248" y2="542" stroke="#db2777" stroke-width="1.8" marker-end="url(#v2-pink)"/>

